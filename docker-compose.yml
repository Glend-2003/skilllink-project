version: '3.9'

services:
  # Base de Datos
  mysql_db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: skilllink_db
    ports:
      - "3306:3306"

  # Servicio de chat
  chat-service:
    build: ./services/chat-service
    ports:
      - "3003:3003"

  # Servicio de usuarios
  user-service:
    build: ./services/user-service
    ports:
      - "3004:3004"
    depends_on:
      - mysql_db
    environment:
      DB_HOST: mysql_db

  # Gateway
  api-gateway:
    build: ./services/api-gateway
    ports:
      - "3000:3000"
    depends_on:
      - user-service
      - chat-service
