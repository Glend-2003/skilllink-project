version: '3.8'
services:
  # Base de Datos
  mysql_db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: skilllink_db
    ports:
      - "3306:3306"

  # Tu servicio de usuarios
  user-service:
    build: ./services/user-service
    ports:
      - "3004:3004"
    depends_on:
      - mysql_db
    environment:
      DB_HOST: mysql_db # Se conecta al nombre del servicio, no a localhost

  # Tu Gateway
  api-gateway:
    build: ./services/api-gateway
    ports:
      - "3000:3000"
    depends_on:
      - user-service